<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app">

    <!-- 헤더 -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <img src="/logo.png" alt="로고" class="logo-img" />
        </div>
        <button class="theme-toggle" id="themeToggle" title="테마 전환">
          <!-- 다크모드일 때: 해 아이콘 / 라이트모드일 때: 달 아이콘 -->
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="main">

      <!-- 히어로 -->
      <section class="hero">
        <h1 class="hero-title">유튜브 영상을 간편하게 저장하세요</h1>
        <p class="hero-sub">링크만 붙여넣으면 원하는 화질과 형식으로 바로 다운로드</p>
      </section>

      <!-- 검색 카드 -->
      <div class="search-card">
        <div class="input-row">
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <input
              type="text"
              id="urlInput"
              class="url-input"
              placeholder="YouTube 링크를 붙여넣으세요"
              autocomplete="off"
            />
            <button class="btn-clear" id="btnClear" style="display:none">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <button class="btn-paste" id="btnPaste">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
              <rect x="8" y="2" width="8" height="4" rx="1"/>
            </svg>
            붙여넣기
          </button>
          <button class="btn-search" id="btnSearch">다운로드</button>
        </div>

        <!-- 에러 -->
        <div class="error-row" id="errorBox" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="errorMsg"></span>
        </div>
      </div>

      <!-- 로딩 -->
      <div class="loading-card" id="loadingBox" style="display:none">
        <div class="loading-spinner"></div>
        <span>영상 정보를 불러오는 중...</span>
      </div>

      <!-- 결과 -->
      <div id="resultSection" style="display:none">

        <!-- 영상 정보 카드 -->
        <div class="video-card">
          <img id="thumbnail" class="video-thumb" src="" alt="" />
          <div class="video-info">
            <p class="video-title" id="videoTitle"></p>
            <div class="video-meta">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              <span id="videoDuration"></span>
            </div>
          </div>
        </div>

        <!-- 비디오 옵션 카드 -->
        <div class="options-card">
          <div class="options-header">
            <div class="options-header-icon video-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2"/>
              </svg>
            </div>
            <div>
              <p class="options-title">비디오 다운로드</p>
              <p class="options-sub">원하는 화질과 파일 형식을 선택하세요</p>
            </div>
          </div>
          <div class="options-list" id="videoOptions"></div>
        </div>

        <!-- 오디오 옵션 카드 -->
        <div class="options-card">
          <div class="options-header">
            <div class="options-header-icon audio-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
              </svg>
            </div>
            <div>
              <p class="options-title">오디오 다운로드</p>
              <p class="options-sub">음악만 추출해서 저장하세요</p>
            </div>
          </div>
          <div class="options-list" id="audioOptions"></div>
        </div>

      </div>
    </main>

    <!-- 다운로드 오버레이 -->
    <div class="dl-overlay" id="downloadOverlay" style="display:none">
      <div class="dl-modal">
        <div class="dl-spinner"></div>
        <p class="dl-title" id="dlStatusText">다운로드 준비 중</p>
        <p class="dl-sub">파일이 준비되면 자동으로 저장됩니다</p>
      </div>
    </div>

    <footer class="footer">
      <p>개인 이용 목적으로만 사용하세요. 저작권법을 준수할 책임은 사용자에게 있습니다.</p>
    </footer>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
